# 本文件是本地 MuJoCo smoke 的主配置。命令行参数优先级高于这里的值。
# 默认单位：m、s、rad、N、N*m。
# LQR 状态顺序：[theta, dtheta, x_b, dx_b, pitch, d_pitch]。
# LQR 输入顺序：[T, Tp]，其中 T 是左右轮公共力矩，Tp 是虚拟腿俯仰力矩。

# 一、运行时与工作点选择。
# leg_length：默认腿长目标。
# minimum_leg_length / maximum_leg_length：腿长命令硬限幅。
# initial_leg_length：启动时的初始腿长目标。
# startup_ramp_seconds：启动腿长过渡时间；当前默认不额外过渡。
# length_schedule：是否启用按实际腿长插值的 F_l0 / X0 / U0 / K 表。
# virtual_rod_control：虚拟腿底层控制模式，正常测试使用 vmc。
# leg_branch 与 ik_search_*：五连杆分支备用搜索参数，正常分支是已验证腿型。
leg_length: 0.24
minimum_leg_length: 0.16
maximum_leg_length: 0.30
initial_leg_length: 0.24
startup_ramp_seconds: 0.0
length_schedule: true
length_schedule_path: config/length_schedule.yaml
visualize_seconds: null
virtual_rod_steps: 800
virtual_rod_control: vmc
leg_branch: normal
ik_search_radius: 0.25
ik_search_samples: 5

# 二、静态接触平衡搜索诊断参数。
# 这组只用于诊断搜索；正常 LQR 路径使用 length_schedule.yaml，不在运行时重新搜索。
# equilibrium_l_slices / theta_refs / fl0_scales：冻结腿长、竖直腿角参考、支撑力缩放扫描值。
# equilibrium_*_kp / kd：搜索时临时控制器增益，不是主 LQR 控制器。
# equilibrium_wheel_com_kps / dampings：搜索时让轮子靠近重心下方的临时轮端控制。
equilibrium_search: false
equilibrium_l_slices: [0.16, 0.20, 0.24, 0.28, 0.30]
equilibrium_theta_refs: [0.0]
equilibrium_fl0_scales: [0.68]
equilibrium_init_modes: [upright-ik]
equilibrium_steps: 5000
equilibrium_eval_steps: 2000
equilibrium_length_kp: 400.0
equilibrium_length_kd: 0.0
equilibrium_theta_kp: 3.0
equilibrium_theta_kd: 2.0
equilibrium_pitch_kp: 3.0
equilibrium_pitch_kd: 2.0
equilibrium_tp_biases: [0.0]
equilibrium_wheel_com_kps: [80.0]
equilibrium_wheel_dampings: [0.5]
equilibrium_init_drop_steps: 0

# 三、腿长 PID 与支撑前馈。
# 每条腿公式：
#   F_l = F_l0 + Kp*(L_ref - L) + Ki*积分(L_ref - L) - Kd*dL
# virtual_rod_length_force_ff：手动前馈 F_l0；启用腿长调度表时，LQR 测试会用表内 F_l0 覆盖。
# virtual_rod_length_force_rate_limit：腿长输出力变化率限幅，单位 N/s；0 表示关闭。
# leg_branch_guard_enabled：五连杆异常分支附近的关节空间保护开关。
virtual_rod_length_kp: 200.0
virtual_rod_length_kd: 50.0
virtual_rod_length_ki: 120.0
virtual_rod_length_integral_limit: 1000000.0
virtual_rod_length_force_ff: 34.5
virtual_rod_length_force_rate_limit: 0.0
leg_branch_guard_enabled: false

# 四、VMC 与整体平衡。
# VMC 映射：
#   tau_joint = J(q)^T [F_l, Tp_side]^T
# virtual_rod_theta_*：弱腿角诊断项；正常平衡主要使用 LQR 输出的 Tp。
# lqr_t_limit / lqr_tp_limit：轮端公共力矩与虚拟腿俯仰力矩限幅。
# landing_hold_t_limit：落地恢复阶段的轮端公共力矩 T 独立限幅，防止触地瞬间强刹。
# lqr_output_rate_limit：LQR 输出斜率限幅，单位 N*m/s；0 表示关闭。
# lqr_output_lowpass_hz：LQR 输出低通截止频率；0 表示关闭。
# lqr_q_diag / lqr_r_diag：LQR 代价矩阵对角线，顺序见文件顶部状态与输入定义。
# lqr_x_outer_*：外层位置到速度环，当前统一不追全局 x，默认关闭。
# lqr_wheel_sign / lqr_pitch_sign：执行器符号约定，未做符号测试不要改。
virtual_rod_theta_kp: 50.0
virtual_rod_theta_kd: 10.0
virtual_rod_joint_kd: 8.0
virtual_rod_theta_pitch_ff: 0.0
lqr_gain_scale: 1.0
lqr_t_limit: 16.0
lqr_tp_limit: 2.0
landing_hold_t_limit: 8.0
lqr_output_rate_limit: 1000.0
lqr_output_lowpass_hz: 0.0
lqr_control_period_steps: null
lqr_q_diag: [1.0, 1.0, 50.0, 100.0, 5000.0, 10.0]  # theta、dtheta、x_b、dx_b、pitch、d_pitch
lqr_r_diag: [1.0, 0.25]                            # T、Tp
lqr_x_outer_kp: 0.0
lqr_x_outer_max_v: 0.35
lqr_wheel_sign: 1.0
lqr_pitch_sign: -1.0

# 五、原地转向与双腿同步。
# yaw_turn_*：期望 yaw 角速度到左右轮差速力矩的 PD。
# leg_sync_*：左右虚拟腿竖直角差到左右相反 Tp 偏置的 PD。
# input_lowpass：原始测量量低通。
# error_lowpass：误差低通。
# derivative_lowpass：微分量低通。
leg_sync_input_lowpass_hz: 500.0
leg_sync_error_lowpass_hz: 10.0
leg_sync_derivative_lowpass_hz: 10.0
yaw_turn_input_lowpass_hz: 500.0
yaw_turn_error_lowpass_hz: 10.0
yaw_turn_derivative_lowpass_hz: 10.0
leg_sync_kp: 30.0
leg_sync_kd: 20.0
yaw_turn_kp: 3.0
yaw_turn_kd: 0.1

# 六、横滚补偿与腿高阶跃测试。
# roll_reference：期望机身横滚角；普通平地测试保持 0。
# roll_force_kp：论文横滚补偿 K_gamma。
#   F_left = F_base + K_gamma*(roll_reference - roll)
#   F_right = F_base - K_gamma*(roll_reference - roll)
# leg_height_levels：腿高阶跃诊断目标，不是步态命令。
# history_sample_interval：绘图/调试历史每隔多少个 MuJoCo 步记录一次。
roll_reference: 0.0
roll_force_kp: 300.0
leg_height_test: false
leg_height_levels: [0.16, 0.23, 0.30]
history_sample_interval: 5

# 七、飞坡与离地检测。
# flight_airborne_force_threshold：左右轮接触法向力都低于该阈值时判定离地。
# flight_airborne_confirm_seconds：低支持力连续保持这么久才确认离地，过滤触地后的短毛刺。
# flight_airborne_rearm_seconds：落地恢复成功后，短时间内不允许再次触发离地。
flight_airborne_force_threshold: 20.0
flight_airborne_confirm_seconds: 0.05
flight_airborne_rearm_seconds: 1.0
