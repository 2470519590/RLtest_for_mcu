# Minimal residual-RL task list for server-side sampling and log buckets.
# Control parameters stay in config/smoke.yaml and code; do not duplicate them here.

tasks:
  forward_jump_medium:
    task_name: forward_jump
    commanded_speed: medium
    landing_command: keep_speed
    run_smoke_args: ["--forward-jump-test", "medium"]
    optimize: ["takeoff", "aerial_pitch", "airborne_tuck", "landing_balance"]
  forward_jump_high:
    task_name: forward_jump
    commanded_speed: high
    landing_command: keep_speed
    run_smoke_args: ["--forward-jump-test", "high"]
    optimize: ["takeoff", "aerial_pitch", "airborne_tuck", "landing_balance"]
  flight_ramp_medium:
    task_name: flight_ramp
    commanded_speed: medium
    landing_command: keep_speed
    run_smoke_args: ["--flight-test", "--flight-test-speed", "medium"]
    optimize: ["aerial_pitch", "landing_balance"]
  flight_ramp_high:
    task_name: flight_ramp
    commanded_speed: high
    landing_command: keep_speed
    run_smoke_args: ["--flight-test", "--flight-test-speed", "high"]
    optimize: ["aerial_pitch", "landing_balance"]
  inplace_jump:
    task_name: inplace_jump
    commanded_speed: zero
    landing_command: quick_stop
    run_smoke_args: ["--jump-test"]
    optimize: ["takeoff_height", "aerial_pitch", "airborne_tuck", "landing_balance"]
